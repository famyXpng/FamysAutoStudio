<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24"/>
      <stop offset="100%" stop-color="#0B0B0D"/>
    </linearGradient>
    
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    
    <linearGradient id="neonCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
    
    <linearGradient id="neonPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <rect x="42" y="42" width="428" height="428" rx="98" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <circle cx="256" cy="256" r="120" fill="url(#neonPurple)" opacity="0.3" filter="blur(40px)"/>

  <path d="M190 150 H 330 L 315 195 H 215 L 195 255 H 275 L 260 300 H 180 L 150 390 H 105 Z" fill="#ffffff" opacity="0.9" filter="url(#shadow)"/>

  <path d="M250 200 L 390 320 L 330 335 L 365 395 L 325 415 L 290 355 L 240 390 Z" fill="url(#neonCyan)" filter="url(#glow)"/>

  <path d="M 120 220 L 90 256 L 120 292" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 392 220 L 422 256 L 392 292" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
